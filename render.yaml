# Render Blueprint — provisions the API + a managed PostgreSQL.
# Deploy: push to GitHub, then in Render → New → Blueprint → pick this repo.
databases:
  - name: stockpilot-db
    plan: free

services:
  - type: web
    name: stockpilot-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockpilot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: AI_MODEL
        value: llama-3.3-70b-versatile
      # Set these in the Render dashboard (sync: false = not stored in the repo):
      - key: WEB_ORIGIN
        sync: false # your Vercel URL, e.g. https://stockpilot.vercel.app
      - key: GROQ_API_KEY
        sync: false # free key from console.groq.com

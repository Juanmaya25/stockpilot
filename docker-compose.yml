services:
  db:
    image: postgres:16-alpine
    container_name: stockpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpilot}
      POSTGRES_DB: ${POSTGRES_DB:-stockpilot}
    ports:
      - "5433:5432" # host 5433 to avoid clashing with a native Postgres on 5432
    volumes:
      - stockpilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockpilot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: stockpilot-adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  stockpilot_pgdata:

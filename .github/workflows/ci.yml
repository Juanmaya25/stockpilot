name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API · build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stockpilot
          POSTGRES_PASSWORD: stockpilot
          POSTGRES_DB: stockpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://stockpilot:stockpilot@localhost:5432/stockpilot?schema=public
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test --if-present
